events { worker_connections 1024; }

http {
  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:5173; }

  server {
    listen 80;
    server_name localhost;

    # API ke FastAPI backend
    location /api/ {
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FastAPI docs (dev only)
    location /docs    { proxy_pass http://backend; }
    location /openapi { proxy_pass http://backend; }
    location /health  { proxy_pass http://backend; }

    # Semua lainnya ke Vue frontend
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
    }
  }
}
